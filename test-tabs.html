<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datalys2 Reports - Tabs Visual Test</title>
    <meta name="description" content="Tests for the 'tabs' container visual: tabs in rows, tabs in grids, nested tabs">
    <meta name="author" content="Brooks, Kameron">
    <link rel="stylesheet" href="http://localhost:8080/dl2-style.css">
</head>
<body>
    <script id="report-data" type="application/json">
{
    "pages": [
        {
            "title": "Tabs in a Row",
            "description": "A row where a KPI sits beside a tab group that switches between a chart, a table, and a grid.",
            "rows": [
                {
                    "type": "layout",
                    "direction": "row",
                    "title": "Link navigation",
                    "children": [
                        { "type": "link", "targetId": "low-scores-table", "label": "Jump to the Low scores table (page 3, tab 3) →", "linkStyle": "button" },
                        { "type": "link", "targetId": "score-trend-chart", "label": "Jump to the score trend chart (this page, Trend tab)", "flex": 0 },
                        { "type": "card", "contentType": "md", "text": "Markdown hash links work too: [go to the nested tabs](#nested-tabs-inner).", "flex": 1 }
                    ]
                },
                {
                    "type": "layout",
                    "direction": "row",
                    "children": [
                        {
                            "type": "kpi",
                            "datasetId": "metrics",
                            "valueColumn": "score",
                            "rowIndex": 0,
                            "title": "Latest Score",
                            "flex": 0,
                            "border": true
                        },
                        {
                            "type": "tabs",
                            "title": "Details",
                            "flex": 2,
                            "border": true,
                            "tabs": [
                                {
                                    "title": "Trend",
                                    "children": [
                                        {
                                            "type": "line",
                                            "id": "score-trend-chart",
                                            "datasetId": "metrics",
                                            "xColumn": "date",
                                            "yColumns": "score",
                                            "title": "Score over time"
                                        }
                                    ]
                                },
                                {
                                    "title": "Data",
                                    "children": [
                                        {
                                            "type": "table",
                                            "datasetId": "metrics",
                                            "pageSize": 6
                                        }
                                    ]
                                },
                                {
                                    "title": "Grid",
                                    "layout": {
                                        "direction": "grid",
                                        "columns": 2,
                                        "children": [
                                            { "type": "card", "text": "Grid cell 1", "border": true },
                                            { "type": "card", "text": "Grid cell 2", "border": true },
                                            { "type": "card", "text": "Grid cell 3", "border": true },
                                            { "type": "card", "text": "Grid cell 4", "border": true }
                                        ]
                                    }
                                }
                            ]
                        }
                    ]
                }
            ]
        },
        {
            "title": "Tabs in a Grid + Nested",
            "description": "Tab groups inside grid cells, and a tab group nested inside another tab group.",
            "rows": [
                {
                    "type": "layout",
                    "direction": "grid",
                    "columns": 2,
                    "children": [
                        {
                            "type": "tabs",
                            "border": true,
                            "tabs": [
                                { "title": "A1", "children": [ { "type": "card", "text": "Cell A, tab 1" } ] },
                                { "title": "A2", "children": [ { "type": "card", "text": "Cell A, tab 2" } ] }
                            ]
                        },
                        {
                            "type": "tabs",
                            "border": true,
                            "tabs": [
                                {
                                    "title": "Outer 1",
                                    "children": [
                                        {
                                            "type": "tabs",
                                            "id": "nested-tabs-inner",
                                            "tabs": [
                                                { "title": "Nested 1", "children": [ { "type": "card", "text": "Deeply nested content 1" } ] },
                                                { "title": "Nested 2", "children": [ { "type": "card", "text": "Deeply nested content 2" } ] }
                                            ]
                                        }
                                    ]
                                },
                                { "title": "Outer 2", "children": [ { "type": "card", "text": "Outer tab 2 content" } ] }
                            ]
                        }
                    ]
                }
            ]
        },
        {
            "title": "Tabs + Filters",
            "description": "Tabs combining the new per-visual filter support: each tab shows a different filtered slice of the same dataset.",
            "rows": [
                {
                    "type": "layout",
                    "direction": "row",
                    "children": [
                        {
                            "type": "tabs",
                            "title": "Scores by band",
                            "defaultTab": 1,
                            "border": true,
                            "tabs": [
                                {
                                    "title": "All",
                                    "children": [ { "type": "table", "datasetId": "metrics", "pageSize": 8 } ]
                                },
                                {
                                    "title": "High (≥ 75)",
                                    "children": [
                                        {
                                            "type": "table",
                                            "datasetId": "metrics",
                                            "filter": { "column": "score", "op": "gte", "value": 75 },
                                            "pageSize": 8
                                        }
                                    ]
                                },
                                {
                                    "title": "Low (< 75)",
                                    "children": [
                                        {
                                            "type": "table",
                                            "id": "low-scores-table",
                                            "datasetId": "metrics",
                                            "filter": { "column": "score", "op": "lt", "value": 75 },
                                            "pageSize": 8
                                        }
                                    ]
                                }
                            ]
                        }
                    ]
                }
            ]
        }
    ],
    "datasets": {
        "metrics": {
            "id": "metrics",
            "columns": ["date", "score", "team"],
            "dtypes": ["date", "int", "str"],
            "format": "records",
            "data": [
                { "date": "2026-01-01", "score": 82, "team": "Alpha" },
                { "date": "2026-02-01", "score": 74, "team": "Alpha" },
                { "date": "2026-03-01", "score": 91, "team": "Beta" },
                { "date": "2026-04-01", "score": 66, "team": "Beta" },
                { "date": "2026-05-01", "score": 78, "team": "Alpha" },
                { "date": "2026-06-01", "score": 85, "team": "Gamma" },
                { "date": "2026-07-01", "score": 59, "team": "Gamma" }
            ]
        }
    }
}
    </script>
    <div id="root"></div>
    <script src="http://localhost:8080/datalys2-reports.min.js"></script>
</body>
</html>
